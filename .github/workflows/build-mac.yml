name: Build macOS

# Build the macOS DMG + ZIP on Apple's free macOS runner.
# Trigger: push a tag like v0.1.0, or run manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      - name: Build macOS (universal DMG + ZIP, unsigned)
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip signing

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3dviewerLAB-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
