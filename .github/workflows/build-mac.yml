name: Build macOS

# A real Mac (Apple cloud runner) builds + boot-tests the .app on every push.
# No local Mac needed: the runner launches the built app and fails the run if
# it crashes at startup — same idea as the A.C.Lib boot check.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write                  # allow pushing the debug log on failure

jobs:
  build-mac:
    runs-on: macos-latest          # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm install

      - name: Build renderer (vite)
        run: npm run build

      - name: SMOKE TEST — renderer bundle exists
        run: |
          test -f dist/index.html || (echo "renderer build missing" && exit 1)
          test -f dist-electron/main.js || (echo "electron main missing" && exit 1)
          echo "smoke ok"

      - name: Package macOS (arm64 ZIP, ad-hoc signed)
        run: npx electron-builder --mac --arm64 2>&1 | tee eb.log
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # no Apple cert; ad-hoc sign only
          DEBUG: electron-builder

      - name: Show error tail on failure
        if: failure()
        run: |
          echo "===== electron-builder log tail ====="
          tail -60 eb.log || true
          echo "===== builder-debug.yml ====="
          cat release/builder-debug.yml 2>/dev/null || echo "(none)"

      - name: Publish debug log on failure (ci-debug branch)
        if: failure()
        run: |
          mkdir -p _ci && cp eb.log _ci/eb.log 2>/dev/null || true
          cp release/builder-debug.yml _ci/builder-debug.yml 2>/dev/null || true
          cd _ci
          git init -q
          git config user.email ci@local && git config user.name ci
          git add -A && git commit -q -m "ci debug $GITHUB_RUN_ID" || true
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:ci-debug

      - name: BOOT CHECK — launch the .app 12s on this Mac
        run: |
          APP=$(find release -maxdepth 3 -name "*.app" | head -1)
          echo "Booting: $APP"
          BIN="$APP/Contents/MacOS/$(basename "$APP" .app)"
          "$BIN" --disable-gpu &
          PID=$!
          sleep 12
          if kill -0 "$PID" 2>/dev/null; then
            echo "✓ app alive after 12s"
            kill "$PID" 2>/dev/null || true
          else
            echo "✗ app exited early — startup crash"
            wait "$PID"; exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3dviewerLAB-macOS
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
